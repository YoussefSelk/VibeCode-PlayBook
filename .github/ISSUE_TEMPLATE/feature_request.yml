name: Feature request
description: Propose an improvement with clear user value
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please focus on user impact and implementation constraints.
  - type: input
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: As a user, I cannot...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the preferred solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other options you evaluated
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits and how?
  - type: textarea
    id: risks
    attributes:
      label: Risks or tradeoffs
      description: Security, legal, compatibility, maintenance, etc.
